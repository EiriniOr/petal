appId: com.petal.app
productName: Petal
copyright: Copyright © 2025
directories:
  buildResources: build
  output: dist
extraResources:
  - from: resources/trayIconTemplate.png
    to: trayIconTemplate.png
  - from: resources/trayIconTemplate@2x.png
    to: trayIconTemplate@2x.png
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,CHANGELOG.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
mac:
  icon: build/icon.png
  target:
    - target: dmg
      arch: arm64
  artifactName: Petal-${version}-arm64.dmg
  extendInfo:
    LSUIElement: false
dmg:
  title: Petal
  window:
    width: 540
    height: 380
